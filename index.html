<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Musical Button</title>
</head>
<body>

<select id="songSelect">
    <option value="Music/1-02. Stereo Madness.mp3">Stereo Madness</option>
    <option value="Music/1-03. Back On Track.mp3">Back On Track</option>
    <option value="Music/1-06. Moog City.mp3">Moog City</option>
    <option value="Music/1-08. Minecraft.mp3">Minecraft</option>
    <option value="Music/1-18. Sweden.mp3">Sweden</option>
    <option value="Music/2-13. Aria Math.mp3">Aria Math</option>
    <option value="Music/1-01. Main Menu.mp3">GD Main Menu</option>
</select>

<button id="playBtn">Play Song</button>

<audio id="player"></audio>

<script>
    const player = document.getElementById("player");

document.getElementById("playBtn").addEventListener("click", () => {
  const selectedSong = document.getElementById("songSelect").value;
  player.src = selectedSong;
  player.play();
});
</script>
    
</body>
</html>
